
# #######################################################################################
#AUTOGENERATED HYPR CONFIG.
#PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
#OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,2560x1600,0x0,1.25

#env = WLR_DRM_DEVICES,/dev/dri/cardN
#env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

#  _________ __                 __                
# /   _____//  |______ ________/  |_ __ ________  
# \_____  \\   __\__  \\_  __ \   __\  |  \____ \ 
# /        \|  |  / __ \|  | \/|  | |  |  /  |_> >
#/_______  /|__| (____  /__|   |__| |____/|   __/ 
#        \/           \/                  |__|    

# Execute your favorite apps at launch
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = hyprpaper
exec-once = swaync
exec-once = hypridle
exec-once = swww-daemon
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

# Script Directory
$scriptsDir = ~/.config/hypr/scripts

# unscale XWayland
xwayland {
	force_zero_scaling = true
}

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

#  ________                                  .__   
# /  _____/  ____   ____   ________________  |  |  
#/   \  ____/ __ \ /    \_/ __ \_  __ \__  \ |  |  
#\    \_\  \  ___/|   |  \  ___/|  | \// __ \|  |__
# \______  /\___  >___|  /\___  >__|  (____  /____/
#        \/     \/     \/     \/           \/      


# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    
    #accel_profile=flat

    touchpad {
        natural_scroll = yes
	scroll_factor = 0.2
	disable_while_typing = no
    }

    sensitivity = -0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ffff66ee) rgba(ff9900ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

#____   ____.__                    .__      ____    ________          _____             .__   __   
#\   \ /   /|__| ________ _______  |  |    /  _ \   \______ \   _____/ ____\____   __ __|  |_/  |_ 
# \   Y   / |  |/  ___/  |  \__  \ |  |    >  _ </\  |    |  \_/ __ \   __\\__  \ |  |  \  |\   __\
#  \     /  |  |\___ \|  |  // __ \|  |__ /  <_\ \/  |    `   \  ___/|  |   / __ \|  |  /  |_|  |  
#   \___/   |__/____  >____/(____  /____/ \_____\ \ /_______  /\___  >__|  (____  /____/|____/__|  
#                   \/           \/              \/         \/     \/           \/                 

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 17
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, myBezier, slide
    animation = windowsOut, 1, 5, myBezier, slide
    #animation = windows, 1, 7, myBezier
    #animation = windowsOut, 1, 7, default, popin 20%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = on
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.

