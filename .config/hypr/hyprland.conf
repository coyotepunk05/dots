# Media Keys

#pactl (disabled)
#bindl = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
#bindl = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
#bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

#pamixer
bindl = , XF86AudioRaiseVolume, exec, pamixer -i 5 @DEFAULT_SINK@
bindl = , XF86AudioLowerVolume, exec, pamixer -d 5 @DEFAULT_AUDIO_SINK@
bindl = , XF86AudioMute, exec, pamixer -t @DEFAULT_SINK@

bindl = , xf86AudioNext, exec, playerctl next
bindl = , xf86AudioPrev, exec, playerctl previous
bindl = , xf86AudioPlay, exec, playerctl play
bindl = , xf86AudioPause, exec, playerctl pause

bindl = , xf86MonBrightnessUp, exec, brightnessctl set 5%+
bindl = , xf86MonBrightnessDown, exec, brightnessctl set 5%-

bindl = ALT, xf86MonBrightnessUp, exec, brightnessctl --device=platform::kbd_backlight set +1
bindl = ALT, xf86MonBrightnessDown, exec, brightnessctl --device=platform::kbd_backlight set 1-
